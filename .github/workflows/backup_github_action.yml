# .github/workflows/backup.yml
# Backup automatique DB toutes les nuits à 02:00 UTC (avant le cron de collecte)

name: DB Backup

on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC chaque nuit
  workflow_dispatch:      # Déclenchement manuel possible

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install pg_dump 17
        run: |
            sudo apt-get install -y curl ca-certificates
            curl https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
            echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
            sudo apt-get update
            sudo apt-get install -y postgresql-client-17

      - name: Backup Supabase
        env:
            PGPASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: |
            DATE=$(date +%Y%m%d_%H%M%S)
            BACKUP_FILE="cronos_${DATE}.dump"
            pg_dump \
                --host=aws-0-eu-west-1.pooler.supabase.com \
                --port=5432 \
                --username=postgres.yfbekbdjvqjsfpczotmy \
                --dbname=postgres \
                --format=custom \
                --no-acl \
                --no-owner \
                --table=users \
                --table=daily_metrics \
                --table=activities \
                --table=athlete_profiles \
                --table=planned_races \
                --table=session_history \
                -f "$BACKUP_FILE"
            echo "✓ Backup : ${BACKUP_FILE} ($(du -sh $BACKUP_FILE | cut -f1))"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: "*.dump"
          retention-days: 30